<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YEHEY! wabyu❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ffd6e7;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    padding:20px;
}

/* Back Button */

.back{
    position:fixed;
    top:30px;
    left:30px;
    text-decoration:none;
    color:black;
    font-size:55px;
    font-weight:bold;
    transition:.3s;
    z-index:1000;
}

.back:hover{
    transform:translateX(-8px);
}

/* Card */

.container{
    width:min(550px, 90vw);
    min-height:650px;
    background:white;
    border:8px solid black;
    border-radius:8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:40px 20px;
    box-shadow:10px 10px 25px rgba(0,0,0,.25);
}

/* Image */

.photo{
    width:min(260px, 60vw);
    height:min(260px, 60vw);
    object-fit:cover;
    border:8px solid black;
    transition:opacity .5s ease;
}

/* Title */

h1{
    margin-top:45px;
    font-size:55px;
    color:#ff4d6d;
    text-align:center;
}

/* Message */

p{
    margin-top:25px;
    font-size:32px;
    color:#333;
    text-align:center;
}

/* ===========================
   Responsive Design
=========================== */

@media (max-width:768px){

    body{
        overflow:auto;
    }

    .back{
        top:20px;
        left:20px;
        font-size:42px;
    }

    .container{
        width:90%;
        min-height:auto;
        padding:30px 20px 40px;
        border-width:6px;
    }

    .photo{
        width:200px;
        height:200px;
        border-width:6px;
    }

    h1{
        margin-top:30px;
        font-size:40px;
    }

    p{
        margin-top:20px;
        font-size:24px;
        line-height:1.4;
    }

}

@media (max-width:480px){

    .back{
        top:15px;
        left:15px;
        font-size:36px;
    }

    .container{
        width:95%;
        padding:25px 15px 35px;
        border-width:5px;
    }

    .photo{
        width:170px;
        height:170px;
        border-width:5px;
    }

    h1{
        font-size:32px;
        margin-top:25px;
    }

    p{
        font-size:20px;
        margin-top:15px;
    }

}

</style>

</head>
<body>

<a href="index.html" class="back">⬅</a>

<div class="container">

    <img src="Gif/cc1.gif" class="photo" id="slideshow" alt="Cute GIF">

    <h1>❤️ YEHEY! ❤️</h1>

    <p>I knew you love me! 🥰</p>

</div>

<script>

// List your images here
const images = [
    "Gif/cc1.gif",
    "Gif/cc2.gif"
];

const slideshow = document.getElementById("slideshow");

let current = 0;

// Change image every 3 seconds
setInterval(() => {

    slideshow.style.opacity = "0";

    setTimeout(() => {

        current = (current + 1) % images.length;
        slideshow.src = images[current];

        slideshow.style.opacity = "1";

    }, 300);

}, 3000);

</script>

</body>
</html>
