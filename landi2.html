<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YEHEY! wabyu❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ffd6e7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* Back Button */

.back{
    position:fixed; /* Stays in the same position */
    top:30px;
    left:30px;
    text-decoration:none;
    color:black;
    font-size:55px;
    font-weight:bold;
    transition:.3s;
    z-index:1000;
}

.back:hover{
    transform:translateX(-8px);
}

/* Card */

.container{
    width:550px;
    height:650px;
    background:white;
    border:8px solid black;
    border-radius:8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding-top:40px;
    box-shadow:10px 10px 25px rgba(0,0,0,.25);
}

/* Image */

.photo{
    width:260px;
    height:260px;
    object-fit:cover;
    border:8px solid black;
    transition:opacity .5s ease;
}

/* Title */

h1{
    margin-top:45px;
    font-size:55px;
    color:#ff4d6d;
}

/* Message */

p{
    margin-top:25px;
    font-size:32px;
    color:#333;
}

</style>

</head>
<body>

<a href="index.html" class="back">⬅</a>

<div class="container">

    <img src="Gif/cc1.gif" class="photo" id="slideshow" alt="Cute GIF">

    <h1>❤️ YEHEY! ❤️</h1>

    <p>I knew you love me! 🥰</p>

</div>

<script>

// List your images here
const images = [
    "Gif/cc1.gif",
    "Gif/cc2.gif"
];

const slideshow = document.getElementById("slideshow");

let current = 0;

// Change image every 3 seconds
setInterval(() => {

    slideshow.style.opacity = "0";

    setTimeout(() => {

        current = (current + 1) % images.length;
        slideshow.src = images[current];

        slideshow.style.opacity = "1";

    }, 300);

}, 3000);

</script>

</body>
</html>
